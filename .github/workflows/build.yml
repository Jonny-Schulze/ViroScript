name: Build Windows EXE
on: [push]  # This triggers the build every time you 'git push'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyperclip pandas openpyxl customtkinter

      - name: Build with PyInstaller
        # IMPORTANT: Replace 'virsosript_test.py' with your actual filename if it changes
        run: pyinstaller --noconsole --onefile virsosript_test.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: MyWindowsTool
          path: dist/*.exe